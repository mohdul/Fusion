<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fusion</title>
    <script>
      // Theme initialization - runs before React to prevent flash
      (function () {
        try {
          var mode = localStorage.getItem("kb-dashboard-theme-mode") || "dark";
          var colorTheme = localStorage.getItem("kb-dashboard-color-theme") || "shadcn-ember";
          var validThemes = [
            "default",
            "ocean",
            "forest",
            "sunset",
            "zen",
            "berry",
            "high-contrast",
            "industrial",
            "monochrome",
            "slate",
            "ash",
            "air",
            "graphite",
            "silver",
            "solarized",
            "factory",
            "factory-mono",
            "ayu",
            "one-dark",
            "nord",
            "dracula",
            "gruvbox",
            "tokyo-night",
            "catppuccin-mocha",
            "github-dark",
            "everforest",
            "rose-pine",
            "kanagawa",
            "night-owl",
            "palenight",
            "monokai-pro",
            "slime",
            "brutalist",
            "neon-city",
            "parchment",
            "terminal",
            "glass",
            "horizon",
            "vitesse",
            "outrun",
            "snazzy",
            "porple",
            "espresso",
            "mars",
            "poimandres",
            "ember",
            "rust",
            "copper",
            "foundry",
            "carbon",
            "sandstone",
            "lagoon",
            "frost",
            "lavender",
            "neon-bloom",
            "sepia",
            "shadcn",
            "shadcn-ember",
            "shadcn-custom",
            "shadcn-blue",
            "shadcn-green",
            "shadcn-red",
            "shadcn-purple",
            "shadcn-pink",
            "shadcn-orange",
            "shadcn-yellow",
            "shadcn-mono-red",
            "shadcn-mono-blue",
            "shadcn-mono-green",
            "shadcn-mono-purple",
            "shadcn-mono-pink",
            "shadcn-mono-orange",
            "shadcn-mono-yellow",
            "shadcn-black",
            "shadcn-gray",
            "shadcn-gray-blue",
          ];

          // FNXC:DashboardTheming 2026-06-30-00:00: Desktop pre-hydration mirrors the full core theme union before falling back to Shadcn Ember, so every explicit legacy id stays valid on native startup.
          if (!validThemes.includes(colorTheme)) {
            colorTheme = "shadcn-ember";
          }

          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var effectiveMode = mode === "system" ? (systemDark ? "dark" : "light") : mode;
          document.documentElement.setAttribute("data-theme", effectiveMode);
          document.documentElement.setAttribute("data-color-theme", colorTheme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.setAttribute("data-color-theme", "shadcn-ember");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
